version: '3.9'

services:
  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: [auth_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-product:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: product_db
      POSTGRES_PASSWORD: password
    ports: ["5433:5432"]
    volumes: [product_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_PASSWORD: password
    ports: ["5434:5432"]
    volumes: [order_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_PASSWORD: password
    ports: ["5435:5432"]
    volumes: [inventory_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_PASSWORD: password
    ports: ["5436:5432"]
    volumes: [payment_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports: ["3001:3001"]
    env_file: ./services/auth-service/.env.example
    depends_on:
      postgres-auth:
        condition: service_healthy

  product-service:
    build: ./services/product-service
    ports: ["3002:3002"]
    env_file: ./services/product-service/.env.example
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    ports: ["3003:3003"]
    env_file: ./services/order-service/.env.example
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build: ./services/inventory-service
    ports: ["3004:3004"]
    env_file: ./services/inventory-service/.env.example
    depends_on:
      postgres-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build: ./services/payment-service
    ports: ["3005:3005"]
    env_file: ./services/payment-service/.env.example
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-recommendation-service:
    build: ./services/ai-recommendation-service
    ports: ["8000:8000"]
    env_file: ./services/ai-recommendation-service/.env.example
    depends_on:
      postgres-product:
        condition: service_healthy

  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - inventory-service
      - payment-service
      - ai-recommendation-service

volumes:
  auth_data:
  product_data:
  order_data:
  inventory_data:
  payment_data:
