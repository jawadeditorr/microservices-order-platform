global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service.ecommerce.svc.cluster.local:3001']
    metrics_path: /metrics

  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service.ecommerce.svc.cluster.local:3002']
    metrics_path: /metrics

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service.ecommerce.svc.cluster.local:3003']
    metrics_path: /metrics

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service.ecommerce.svc.cluster.local:3004']
    metrics_path: /metrics

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service.ecommerce.svc.cluster.local:3005']
    metrics_path: /metrics

  - job_name: 'ai-recommendation-service'
    static_configs:
      - targets: ['ai-recommendation-service.ecommerce.svc.cluster.local:8000']
    metrics_path: /metrics
